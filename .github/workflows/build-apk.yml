name: Build APK

on:
  push:
    branches: [main, master, release]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        flavor:
          - suffix: ''
            apk_name: 'AstrBot_1.5.3fix'
          - suffix: '.clone'
            apk_name: 'AstrBot_1.5.3fix.clone'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prepare NDK and CMake directories
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk/ndk
          sudo mkdir -p /usr/local/lib/android/sdk/cmake
          sudo chown -R $USER:$USER /usr/local/lib/android/sdk/ndk
          sudo chown -R $USER:$USER /usr/local/lib/android/sdk/cmake

      - name: Cache Android NDK and CMake
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/cmake
          key: ${{ runner.os }}-android-ndk-cmake-${{ hashFiles('android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-ndk-cmake-

      - name: Rename package for clone build
        if: matrix.flavor.suffix != ''
        run: |
          # 替换包名
          find android lib -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.dart" -o -name "*.java" -o -name "*.kt" \) \
            -exec sed -i 's/com\.astrbot\.astrbot_android/com.astrbot.astrbot_android1/g' {} +
          # 重命名 Java 目录
          mv android/app/src/main/java/com/astrbot/astrbot_android \
             android/app/src/main/java/com/astrbot/astrbot_android1 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ matrix.flavor.apk_name }}.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.flavor.apk_name }}
          path: build/app/outputs/flutter-apk/${{ matrix.flavor.apk_name }}.apk
